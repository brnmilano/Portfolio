name: CI - Next.js

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Rodar ESLint
        run: npm run lint

      # - name: Rodar Testes
      #   run: npm test

      - name: Build do projeto
        run: npm run build
